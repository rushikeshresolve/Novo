<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Tailwind v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.0/dist/tailwind.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="max-w-7xl mx-auto p-4">
      <!-- Breadcrumb -->
      <div class="text-sm text-gray-500 mb-4">
        Home > <span class="text-gray-700 font-medium">Products</span>
      </div>

      <!-- Mobile Filter Button -->
      <div class="md:hidden mb-4">
        <button
          id="openFilter"
          class="bg-blue-600 text-white px-4 py-2 rounded"
        >
          Filters
        </button>
      </div>

      <div class="flex gap-6">
        <!-- Sidebar -->
        <aside
          id="sidebar"
          class="sidebar fixed md:static top-0 left-0 h-full md:h-auto w-72 bg-white p-5 shadow transform -translate-x-full md:translate-x-0 z-50 overflow-y-auto"
        >
          <!-- Close button (mobile) -->
          <div class="md:hidden flex justify-end mb-2">
            <button id="closeFilter" class="text-xl">✕</button>
          </div>

          <h2 class="font-semibold text-lg mb-4">Filter Product</h2>

          <!-- Categories -->
          <div class="border-b pb-3 mb-3">
            <div
              class="flex justify-between items-center cursor-pointer toggle"
            >
              <span class="font-medium">Categories</span>
              <span class="text-lg">−</span>
            </div>

            <div class="mt-3 space-y-2 text-sm">
              <label class="flex items-center gap-2">
                <input type="checkbox" /> Vaccine
              </label>
              <label class="flex items-center gap-2">
                <input type="checkbox" /> Injectables
              </label>
              <label class="flex items-center gap-2">
                <input type="checkbox" /> Pediatric Oral
              </label>
              <label class="flex items-center gap-2">
                <input type="checkbox" /> Pipeline
              </label>
            </div>
          </div>

          <!-- Therapeutic Area -->
          <div class="border-b pb-3 mb-3">
            <div
              class="flex justify-between items-center cursor-pointer toggle"
            >
              <span class="font-medium">Therapeutic Area</span>
              <span class="text-lg">+</span>
            </div>

            <div class="hidden mt-3 text-sm text-gray-500">Options here...</div>
          </div>

          <!-- Price -->
          <!-- <div class="border-b pb-3 mb-3">
            <div
              class="flex justify-between items-center cursor-pointer toggle"
            >
              <span class="font-medium">Price</span>
              <span class="text-lg">+</span>
            </div>

            <div class="hidden mt-3">
              <input type="range" min="0" max="200" class="w-full" />
              <div class="flex justify-between text-xs text-gray-500 mt-1">
                <span>₹0</span>
                <span>₹200</span>
              </div>
            </div>
          </div> -->

          <!-- Buttons -->
          <div class="flex gap-2 mt-4">
            <button class="bg-blue-600 text-white px-4 py-2 rounded w-full">
              Apply
            </button>
            <button class="border px-4 py-2 rounded w-full">Reset</button>
          </div>
        </aside>

        <!-- Overlay (mobile) -->
        <div
          id="overlay"
          class="fixed inset-0 bg-black bg-opacity-40 hidden md:hidden"
        ></div>

        <!-- Main -->
        <main class="flex-1">
          <!-- Top Bar -->
          <div class="flex flex-col md:flex-row md:justify-between gap-3 mb-4">
            <input
              id="searchInput"
              type="text"
              placeholder="Search For Products..."
              class="border rounded px-4 py-2 w-full md:w-1/2"
            />

            <select id="sortSelect" class="border px-3 py-2 rounded">
              <option value="az">Sort By: A-Z</option>
              <option value="price">Sort By: Price</option>
            </select>
          </div>

          <!-- Products -->
          <div
            id="productGrid"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"
          ></div>

          <!-- Pagination -->
          <div id="pagination" class="flex justify-center mt-6 gap-2"></div>

          <!-- Similar -->
          <div class="mt-10">
            <h2 class="text-xl font-semibold mb-4">Similar Products</h2>
            <div
              id="similarGrid"
              class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"
            ></div>
          </div>
        </main>
      </div>
    </div>
  </body>
  <script>

    
    document.querySelectorAll(".toggle").forEach(item => {
        item.addEventListener("click", () => {
            const content = item.nextElementSibling;
            content.classList.toggle("hidden");

            const symbol = item.querySelector("span:last-child");
            symbol.textContent = content.classList.contains("hidden") ? "+" : "−";
        });
    });



    /* ================= DATA ================= */
    const products = [
        { name: "Augnex", price: 58 },
        { name: "Amoxycillin", price: 78 },
        { name: "Azithromycin Tablet", price: 95 },
        { name: "Exaclav - 1.2", price: 45 },
        { name: "Moxiclavam - 1.2", price: 88 },
        { name: "Augcure - 600", price: 98 },
        { name: "Cefixime", price: 70 },
        { name: "Dolo", price: 30 }
    ];

    let currentPage = 1;
    const perPage = 6;

    /* ================= RENDER ================= */
    function renderProducts() {
        const grid = document.getElementById("productGrid");
        const search = document.getElementById("searchInput").value.toLowerCase();
        const sort = document.getElementById("sortSelect").value;

        let filtered = products.filter(p =>
            p.name.toLowerCase().includes(search)
        );

        if (sort === "az") filtered.sort((a, b) => a.name.localeCompare(b.name));
        if (sort === "price") filtered.sort((a, b) => a.price - b.price);

        const start = (currentPage - 1) * perPage;
        const paginated = filtered.slice(start, start + perPage);

        grid.innerHTML = paginated.map(p => `
    <div class="bg-white p-4 rounded shadow text-center">
      <img src="https://randomuser.me/api/portraits/men/32.jpg" class="mx-auto mb-2">
      <h3 class="font-semibold">${p.name}</h3>
      <p class="text-blue-600 font-bold">₹ ${p.price}</p>
      <div class="flex justify-between mt-2 text-sm">
        <button class="text-blue-600">View More →</button>
        <button class="bg-blue-600 text-white px-3 py-1 rounded">Enquire</button>
      </div>
    </div>
  `).join("");

        renderPagination(filtered.length);
    }

    /* ================= PAGINATION ================= */
    function renderPagination(total) {
        const pages = Math.ceil(total / perPage);
        const container = document.getElementById("pagination");

        container.innerHTML = "";
        for (let i = 1; i <= pages; i++) {
            container.innerHTML += `
      <button onclick="goPage(${i})"
        class="px-3 py-1 rounded ${i === currentPage ? 'bg-blue-600 text-white' : 'border'}">
        ${i}
      </button>
    `;
        }
    }

    function goPage(p) {
        currentPage = p;
        renderProducts();
    }

    /* ================= SIMILAR ================= */
    function renderSimilar() {
        const grid = document.getElementById("similarGrid");
        grid.innerHTML = products.slice(0, 4).map(p => `
    <div class="bg-white p-3 rounded shadow text-center">
      <img src="https://randomuser.me/api/portraits/men/32.jpg" class="mx-auto">
      <p>${p.name}</p>
      <p class="text-blue-600">₹ ${p.price}</p>
    </div>
  `).join("");
    }

    /* ================= FILTER SIDEBAR ================= */
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    document.getElementById("openFilter").onclick = () => {
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.remove("hidden");
    };

    document.getElementById("closeFilter").onclick = closeSidebar;
    overlay.onclick = closeSidebar;

    function closeSidebar() {
        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");
    }

    /* ================= EVENTS ================= */
    document.getElementById("searchInput").addEventListener("input", () => {
        currentPage = 1;
        renderProducts();
    });

    document.getElementById("sortSelect").addEventListener("change", renderProducts);

    /* ================= INIT ================= */
    renderProducts();
    renderSimilar();

  </script>
</html>
